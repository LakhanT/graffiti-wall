<!DOCTYPE html>
<html>
<head>
<title>Kiosk</title>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
<style>
body{margin:0;font-family:sans-serif;background:#515;color:#fff;text-align:center}
.container{display:flex;justify-content:center;gap:20px;padding:20px}
.controls{background:#fff;color:#000;padding:15px;border-radius:0px;width:250px}
canvas{border-radius:2px;background:#fff}
button{margin:5px;padding:8px;border:none;border-radius:0px;background:#667eea;color:#fff}
</style>
</head>
<body>
<h2>Graffiti Kiosk</h2>
<div class="container">
<div class="controls">
<input type="color" id="color">
<input type="range" id="size" min="1" max="20">
<button onclick="clearCanvas()">Clear</button>
<button onclick="undo()">Undo</button>
<button onclick="toggleEraser()">Eraser</button>
<input type="file" id="uploadImage">
<div>
<button onclick="selectEmoji('😀')">😀</button>
<button onclick="selectEmoji('🔥')">🔥</button>
</div>
<button onclick="submitCanvas()">Submit</button>
</div>
<div>
<canvas id="canvas" width="900" height="600"></canvas>
<img id="qrImage"/>
</div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
